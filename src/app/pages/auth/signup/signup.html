<!-- Signup Page -->
<section class="flex flex-col min-h-[100dvh] space-y-5 px-5 py-10 justify-center items-center">

  <!-- Logo and Title -->
  <div class="flex flex-col items-center justify-center sm:mx-auto sm:w-full sm:max-w-md">
    <a href="/" class="size-16">
      <img src="/logos/logo2-min.svg" alt="Logo" class="size-16 object-contain" />
    </a>

    <div class="text-center space-y-1">
      <h2 class="mt-6 text-3xl font-semibold tracking-tight">
        Crear una cuenta
      </h2>
      <p class="text-sm text-gray-800">Registra tus datos para unirte a Escapify.</p>
    </div>
  </div>

  <!-- Signup Form -->
  <form class="max-w-sm w-full mx-auto space-y-4 mt-5">

    <!-- Email -->
    <div class="relative">
      <input type="email"
        class="w-full pl-14 px-4 py-3 border border-gray-300 rounded-full shadow-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"
        placeholder="Correo electrónico" />

      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-mail-icon lucide-mail absolute left-6 top-1/2 size-5 -translate-y-1/2 text-gray-500">
        <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
        <rect x="2" y="4" width="20" height="16" rx="2" />
      </svg>
    </div>

    <!-- Signup Button -->
    <button type="submit"
      class="btn-primary sm:text-primary-sm w-full !font-medium max-sm:!py-3 !py-2.5">
      Continuar con correo electrónico
    </button>
  </form>

  <div class="flex items-center w-full max-w-sm mx-auto">
    <hr class="grow border-gray-300" />
    <span class="mx-4 text-gray-700 text-sm">o continuar con</span>
    <hr class="grow border-gray-300" />
  </div>

  <div class="flex items-center gap-x-2 w-full max-w-sm mx-auto">
    <button class="w-full font-medium py-2.5! border border-gray-300 rounded-full flex items-center justify-center gap-x-3 hover:shadow focus:outline-none focus:ring-2 focus:ring-primary">
      <img src="/images/google-icon.png" alt="" class="size-4">
      Google
    </button>

    <button class="w-full font-medium py-2.5! border border-gray-300 rounded-full flex items-center justify-center gap-x-3 hover:shadow focus:outline-none focus:ring-2 focus:ring-primary">
      <img src="/images/facebook-icon.png" alt="" class="size-4">
      Facebook
    </button>
  </div>

  <!-- Login -->
  <div class="flex gap-x-2 items-center text-sm justify-center mt-5">
    <p class="text-center">
      ¿Ya tienes una cuenta?
    </p>
    <a href="/auth/ingresar" class="text-primary font-semibold hover:underline">Inicia sesión</a>
  </div>

</section>
<!-- End Signup Page -->
