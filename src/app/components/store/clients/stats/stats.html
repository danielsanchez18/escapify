<section class="grid sm:grid-cols-2 xl:grid-cols-4 gap-4">

  <!-- Clientes totales -->
  <article class="w-full bg-white py-5 space-y-2 px-5 rounded-xl border border-gray-300">
    <div class="flex text-sm text-gray-600 items-center justify-between">
      <h3>Clientes totales</h3>
      <lucide-icon [img]="Users" class="size-5 stroke-[1.5]" />
    </div>

    <div class="space-y-1">
      <p class="font-medium text-xl">2356 <span class="text-sm">clientes</span></p>
      <div class="flex items-center gap-x-1 text-green-600">
        <lucide-icon [img]="TrendingUp" class="size-4" />
        <p class="text-xs line-clamp-1 font-medium">+145 este mes</p>
      </div>
    </div>
  </article>

  <!-- Clientes frecuentes -->
  <article class="w-full bg-white py-5 space-y-2 px-5 rounded-xl border border-gray-300">
    <div class="flex text-sm text-gray-600 items-center justify-between">
      <h3>Clientes frecuentes</h3>
      <lucide-icon [img]="Users" class="size-5 stroke-[1.5]" />
    </div>

    <div class="space-y-1">
      <p class="font-medium text-xl">1631 <span class="text-sm mr-2">clientes</span></p>
      <p class="text-xs text-gray-500 line-clamp-1">63 nuevos este mes</p>
    </div>
  </article>

  <!-- Total de sucursales -->
  <article class="w-full bg-white py-5 space-y-2 px-5 rounded-xl border border-gray-300">
    <div class="flex text-sm text-gray-600 items-center justify-between">
      <h3>Total de sucursales</h3>
      <lucide-icon [img]="Store" class="size-5 stroke-[1.5]" />
    </div>

    <div class="space-y-1">
      <p class="font-medium text-xl">1<span class="text-sm"> sucursal</span></p>
      <p class="text-xs text-gray-500 line-clamp-1">1 sucursal activa ahora</p>
    </div>
  </article>

  <!-- Total de usuarios -->
  <article class="w-full bg-white py-5 space-y-2 px-5 rounded-xl border border-gray-300">
    <div class="flex text-sm text-gray-600 items-center justify-between">
      <h3>Total de usuarios</h3>
      <lucide-icon [img]="Users" class="size-5 stroke-[1.5]" />
    </div>

    <div class="space-y-1">
      <p class="font-medium text-xl">1,263 <span class="text-sm">usuarios</span></p>
      <p class="text-xs text-gray-500">235 nuevos este mes</p>
    </div>
  </article>


</section>
