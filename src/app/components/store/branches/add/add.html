<div
  class="hs-overlay-animation-target hs-overlay-open:scale-100 hs-overlay-open:opacity-100 scale-95 opacity-0 ease-in-out transition-all duration-200 sm:max-w-lg sm:w-full m-3 sm:mx-auto min-h-[calc(100%-56px)] flex items-center">

  <div
    class="bg-white w-full flex flex-col bg-overlay border border-gray-200 shadow-2xs rounded-2xl pointer-events-auto overflow-hidden">

    <!-- Encabezado del modal -->
    <div class="flex justify-end pt-5 px-5">

      <!-- Boton de cerrar -->
      <button type="button"
        class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full text-gray-500 hover:text-black hover:bg-gray-100 focus:outline-hidden focus:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none"
        aria-label="Close" data-hs-overlay="#hs-add-branch-modal">
        <span class="sr-only">Close</span>
        <svg class="shrink-0 size-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Cuerpo del modal -->
    <div class="overflow-y-auto">

      <!-- Título -->
      <div class="text-center mt-2 mb-7 px-5">
        <div class="size-10 bg-gray-200 overflow-hidden rounded-lg mx-auto mb-3">
          <img src="logos/logo2-min.svg" alt="Logo de la tienda" class="size-10 object-cover">
        </div>
        <h2 class="text-lg font-medium">Crear sucursal</h2>
        <p class="text-gray-700 text-sm">Agrega una nueva sucursal a tu tienda.</p>
      </div>

      <!-- Formulario -->
      <form class="grid md:grid-cols-2 px-5 md:px-7 gap-x-5 gap-y-3">

        <!-- Nombre referencial de la sucursal -->
        <div class="flex flex-col gap-y-2 md:col-span-2">
          <label class="text-sm font-medium">Nombre Referencial</label>
          <input type="text"
            class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary"
            placeholder="Ej: Sucursal Lima">
        </div>

        <!-- Dirección de la sucursal -->
        <div class="flex flex-col gap-y-2 md:col-span-2">
          <label class="text-sm font-medium">Dirección</label>
          <input type="text"
            class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary"
            placeholder="Ej: Av. Principal 123, Lima">
        </div>

        <!-- Ciudad -->
        <div class="flex flex-col gap-y-2">
          <label class="text-sm font-medium">Ciudad</label>
          <input type="text"
            class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary"
            placeholder="Ej: Lima">
        </div>

        <!-- Distrito -->
        <div class="flex flex-col gap-y-2">
          <label class="text-sm font-medium">Distrito</label>
          <input type="text"
            class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary"
            placeholder="Ej: Miraflores">
        </div>

        <!-- Teléfono de contacto -->
        <div class="flex flex-col gap-y-2 md:col-span-2">
          <label class="text-sm font-medium">Teléfono de contacto</label>
          <input type="text"
            class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary"
            placeholder="Ej: +51 987654321">
        </div>
      </form>

      <!-- Botón de guardar -->
      <div class="flex justify-end py-7 px-5 md:px-7 bg-white">
        <button class="btn-primary text-sm w-full font-medium!">
          Crear Sucursal
        </button>
      </div>
    </div>
  </div>

</div>
