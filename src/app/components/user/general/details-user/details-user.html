<section class="bg-white border border-gray-300 rounded-2xl overflow-hidden">

  <div class="border-b border-gray-300 px-5 py-3">
    <h2 class="text-sm font-medium">Detalles del usuario</h2>
  </div>

  <div class="flex flex-col gap-5 px-5 py-5">

    <!-- Cambiar foto de perfil -->
    <div class="flex items-center gap-x-3">
      <div class="rounded-full size-10 bg-gray-300"></div>
      <button class="text-sm hover:text-primary underline-offset-4 font-medium hover:underline">
        Cambiar foto de perfil
      </button>
    </div>

    <!-- Nombres de usuario -->
    <div class="grid lg:grid-cols-2 gap-5">
      <div class="flex flex-col gap-y-2">
        <label class="text-sm font-medium">Nombres</label>
        <input type="text"
          class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary"
          placeholder="Ingrese sus nombres">
      </div>

      <div class="flex flex-col gap-y-2">
        <label class="text-sm font-medium">Apellidos</label>
        <input type="text"
          class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary"
          placeholder="Ingrese sus apellidos">
      </div>
    </div>

    <!-- Correo -->
    <div class="flex flex-col gap-y-2">
      <label class="text-sm font-medium">Correo electrónico</label>
      <div class="flex items-start gap-x-3">
        <div class="w-full">
          <input type="email"
            class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary w-full  "
            placeholder="Ingrese su correo electrónico" value="dsanchez151r@gmail.com" disabled>

          <!-- If: el correo electrónico no está verificado, mostrar un mensaje de advertencia -->
          <div class="text-xs text-yellow-600 mt-1">
            <span class="font-medium">Correo no verificado.</span> Por favor, verifica tu correo electrónico para acceder a todas las funciones.
          </div>

        </div>
        <button class="mt-2 text-sm hover:text-primary underline-offset-4 font-medium hover:underline">
          Cambiar
        </button>
      </div>
    </div>

    <!-- Teléfono -->
    <div class="flex flex-col gap-y-2">
      <label class="text-sm font-medium">Teléfono (opcional)</label>
      <input type="text"
        class="border border-gray-300 rounded-lg text-sm py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary"
        placeholder="Ingrese su número de teléfono">

    </div>
  </div>

</section>
